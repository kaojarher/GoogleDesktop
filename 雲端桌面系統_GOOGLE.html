<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mydesktop雲端桌面V1 (Google Drive終極修正版)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, "Segoe UI", "Tahoma", "Helvetica Neue", sans-serif;
            user-select: none;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            transition: background-color 0.2s, background-image 0.2s;
        }
        /* 桌面區域 */
        #desktop {
            position: relative; height: calc(100% - 50px); padding: 20px;
            display: flex; flex-direction: column; flex-wrap: wrap;
            align-content: flex-start; gap: 20px; overflow-y: auto; overflow-x: hidden;
        }
        .desktop-icons-container {
            display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; height: 100%;
        }
        .icon {
            width: 85px; text-align: center; cursor: grab; transition: 0.05s linear;
            padding: 6px; border-radius: 8px; background: transparent; position: relative;
        }
        .icon:active { cursor: grabbing; }
        .icon.dragging { opacity: 0.5; }
        .icon .icon-img {
            width: 56px; height: 56px; margin: 0 auto; display: flex;
            align-items: center; justify-content: center; font-size: 48px; pointer-events: none;
        }
        .icon span { display: block; font-size: 12px; margin-top: 6px; font-weight: 500; word-break: break-word; }
        body.xp-theme .icon span { color: white; text-shadow: 1px 1px 1px black; }
        body.mac-theme .icon span { color: #1e1e1e; text-shadow: 0 1px 0 rgba(255,255,255,0.5); }

        /* 視窗樣式 */
        .window {
            position: absolute; min-width: 350px; border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: none; flex-direction: column; z-index: 100;
        }
        .window-header {
            height: 32px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; font-weight: bold; cursor: move; border-top-left-radius: inherit; border-top-right-radius: inherit;
        }
        .window-controls button {
            width: 28px; height: 24px; border: none; border-radius: 6px; background: rgba(0,0,0,0.2); cursor: pointer; margin-left: 6px;
        }
        .close-btn { background: #ff5f5f; color: white; }
        .window-body { flex: 1; padding: 16px; overflow-y: auto; background: white; border-radius: 0 0 10px 10px; }
        
        body.xp-theme .window { border: 3px solid #0058e6; border-radius: 8px 8px 0 0; background: #ece9d8; }
        body.xp-theme .window-header { background: linear-gradient(to bottom, #0058e6 0%, #0869f6 4%, #005ad9 6%, #005ad9 90%, #0030ad 100%); color: white; }
        body.mac-theme .window { background: rgba(245, 245, 247, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); border-radius: 12px; }
        body.mac-theme .window-header { background: rgba(240, 240, 245, 0.7); color: #1c1c1e; border-bottom: 1px solid #ccc; }

        /* 工作列 */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 50px; display: flex; align-items: center; z-index: 200; }
        body.xp-theme #taskbar { background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%); border-top: 1px solid #3f9cff; }
        body.mac-theme #taskbar { background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.1); padding: 0 20px; }
        
        #start-btn { font-weight: bold; cursor: pointer; padding: 0 18px; height: 80%; border-radius: 12px; border: none; }
        body.xp-theme #start-btn { background: linear-gradient(to bottom, #388e3c, #4caf50); color: white; font-style: italic; border-radius: 0 12px 12px 0; }
        body.mac-theme #start-btn { background: #2e2e32; color: white; font-weight: 600; }
        
        .quick-launch { display: flex; gap: 6px; margin-left: 12px; align-items: center; height: 100%; }
        .quick-launch-item {
            width: 36px; height: 36px; cursor: pointer; background: rgba(0,0,0,0.2);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .quick-launch-item .emoji-icon { font-size: 24px; text-align: center; }
        .taskbar-time { margin-left: auto; margin-right: 20px; font-size: 14px; }
        body.xp-theme .taskbar-time { color: white; }
        body.mac-theme .taskbar-time { color: #1c1c1e; }

        /* 雲端硬碟檔案列表樣式 */
        .drive-toolbar { display:flex; gap:8px; margin-bottom:10px; }
        .drive-toolbar button { padding:4px 10px; border-radius:6px; border:1px solid #ccc; background:#f0f0f0; cursor:pointer; font-size:12px; }
        .drive-toolbar button.active { background:#245edb; color:white; border-color:#245edb; }
        /* 格狀檢視 */
        .drive-list.view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; padding: 6px 0; }
        .drive-list.view-grid .drive-item {
            height: 100px; border: 1px solid rgba(0,0,0,0.07); padding: 10px 6px 8px;
            text-align: center; border-radius: 10px; background: #f9f9f9; cursor: pointer;
            transition: background 0.15s, border-color 0.15s; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 6px; overflow: hidden;
        }
        .drive-list.view-grid .drive-item:hover { background: #eef5ff; border-color: #3f8cf3; }
        .drive-list.view-grid .file-icon { font-size: 34px; line-height: 1; flex-shrink: 0; }
        .drive-list.view-grid .file-name { font-size: 11px; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }
        /* 列表檢視 */
        .drive-list.view-list { display: flex; flex-direction: column; gap: 2px; padding: 4px 0; }
        .drive-list.view-list .drive-item {
            display: flex; flex-direction: row; align-items: center; gap: 10px;
            padding: 7px 10px; border-radius: 8px; background: transparent; cursor: pointer;
            border: 1px solid transparent; transition: background 0.15s;
        }
        .drive-list.view-list .drive-item:hover { background: #eef5ff; border-color: #3f8cf3; }
        .drive-list.view-list .file-icon { font-size: 22px; flex-shrink: 0; }
        .drive-list.view-list .file-name { font-size: 13px; font-weight: 400; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; flex: 1; }
        .drive-list.view-list .file-type-badge { font-size: 11px; color: #999; flex-shrink: 0; }

        /* 開始功能表 */
        .start-menu {
            position: fixed; bottom: 50px; left: 0; width: 260px; background: rgba(240,240,245,0.95);
            backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 250;
            display: none; padding: 8px 0;
        }
        .start-menu-item { padding: 10px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; }
        .start-menu-item:hover { background: rgba(0,0,0,0.05); }
        hr { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 6px 0; }

        /* 群組與表單樣式 */
        .shortcut-form input, .shortcut-form select { width: 100%; margin: 8px 0; padding: 8px; border-radius: 6px; border: 1px solid #aaa; }
        .shortcut-manager { max-height: 180px; overflow-y: auto; border: 1px solid #ccc; border-radius: 8px; margin: 10px 0; }
        .shortcut-row, .group-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-bottom: 1px solid #eee; }
        .shortcut-row span, .group-row span { flex: 2; font-size: 13px; display: flex; align-items: center; gap: 8px; }

        /* 群組資料夾 UI */
        .icon-group { display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; padding: 6px; border-radius: 12px; width: 85px; text-align: center; }
        .group-folder {
            width: 56px; height: 56px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 3px; padding: 6px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        body.xp-theme .group-folder { background: rgba(0,60,180,0.35); border: 2px solid rgba(100,160,255,0.6); }
        body.mac-theme .group-folder { background: rgba(255,255,255,0.4); border: 2px solid rgba(200,200,200,0.7); }
        .group-preview-icon { font-size: 13px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* 群組展開彈窗 */
        #groupPopup {
            position: fixed; z-index: 300; background: rgba(30,30,40,0.9); backdrop-filter: blur(24px);
            border-radius: 20px; padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
            display: none; min-width: 220px; max-width: 320px;
        }
        #groupPopupGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .popup-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 6px; border-radius: 10px; color: white; font-size: 11px; }
        .popup-item:hover { background: rgba(255,255,255,0.15); }
        #groupPopupOverlay { position: fixed; inset: 0; z-index: 299; display: none; }
        /* ===== 右鍵選單 ===== */
        #ctxMenu {
            position: fixed; z-index: 9999; background: rgba(248,248,250,0.97);
            backdrop-filter: blur(16px); border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.22);
            border: 1px solid rgba(0,0,0,0.1); padding: 5px 0; min-width: 170px; display: none;
        }
        .ctx-item { padding: 7px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 9px; color: #222; }
        .ctx-item:hover { background: #3f8cf3; color: white; }
        .ctx-sep { border: none; border-top: 1px solid #e0e0e0; margin: 4px 0; }
        .ctx-danger:hover { background: #e53935; }

        /* ===== 圖片預覽燈箱 ===== */
        #imgLightbox {
            display: none; position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center; flex-direction: column;
        }
        #imgLightbox.open { display: flex; }
        #imgLightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
        #imgLightboxName { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 12px; }
        #imgLightboxClose { position: absolute; top: 18px; right: 24px; font-size: 28px; color: white; cursor: pointer; line-height: 1; }

        /* ===== 搜尋列 ===== */
        #driveSearchBar { display: flex; gap: 6px; margin-bottom: 8px; }
        #driveSearchInput { flex: 1; padding: 5px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; }
        #driveSearchBtn { padding: 5px 12px; border-radius: 6px; border: none; background: #3f8cf3; color: white; cursor: pointer; font-size: 13px; }
        #driveSearchClear { padding: 5px 10px; border-radius: 6px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; font-size: 13px; display: none; }

        /* ===== 排序列 ===== */
        #driveSortBar { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; font-size: 12px; color: #666; }
        #driveSortBar select { padding: 3px 7px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; }

        /* ===== 便利貼 ===== */
        .sticky-note {
            position: absolute; width: 200px; min-height: 120px; border-radius: 4px 4px 0 0;
            box-shadow: 3px 4px 14px rgba(0,0,0,0.25); z-index: 50; cursor: move; display: flex; flex-direction: column;
        }
        .sticky-header { height: 26px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 12px; font-weight: bold; border-radius: 4px 4px 0 0; cursor: move; }
        .sticky-body { flex: 1; padding: 8px; font-size: 13px; resize: none; border: none; background: transparent; outline: none; font-family: inherit; min-height: 90px; }
        .sticky-close { cursor: pointer; font-size: 14px; background: none; border: none; color: rgba(0,0,0,0.5); }

        /* ===== 視窗最小化 ===== */
        .min-btn { background: #f5a623 !important; color: white !important; }
        .max-btn { background: #27c93f !important; color: white !important; }
        .taskbar-win-btn {
            height: 70%; padding: 0 10px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 12px; background: rgba(255,255,255,0.2); color: white; max-width: 130px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        body.mac-theme .taskbar-win-btn { background: rgba(0,0,0,0.1); color: #333; }
        #taskbarWinArea { display: flex; gap: 5px; margin-left: 6px; align-items: center; height: 100%; }

        /* ===== 計算機小工具 ===== */
        #calc-window .calc-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 8px; }
        #calc-window .calc-btn { padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; font-size: 15px; font-weight: 500; }
        #calc-window .calc-btn:hover { background: #e0eaff; }
        #calc-window .calc-btn.op { background: #dde8ff; color: #245edb; }
        #calc-window .calc-btn.eq { background: #245edb; color: white; grid-column: span 2; }
        #calc-window .calc-btn.clr { background: #fde8e8; color: #c0392b; }
        #calc-window #calcDisplay { font-size: 22px; text-align: right; padding: 8px 10px; background: #f0f4ff; border-radius: 8px; border: 1px solid #ccc; min-height: 44px; word-break: break-all; }

        /* ===== 拖曳上傳覆蓋層 ===== */
        #dropOverlay {
            display: none; position: absolute; inset: 0; border-radius: 0 0 10px 10px;
            background: rgba(63,140,243,0.18); border: 3px dashed #3f8cf3;
            z-index: 400; align-items: center; justify-content: center;
            font-size: 22px; color: #3f8cf3; font-weight: bold; pointer-events: none;
        }
        #dropOverlay.active { display: flex; }

        .dl-btn {
            display: none; position: absolute; bottom: 4px; right: 4px;
            background: rgba(255,255,255,0.9); border: 1px solid #ccc; border-radius: 6px;
            padding: 2px 5px; font-size: 12px; cursor: pointer; line-height: 1;
        }
        .drive-list.view-grid .drive-item { position: relative; }
        .drive-list.view-grid .drive-item:hover .dl-btn { display: block; }
        .drive-list.view-list .dl-btn { display: inline-block; margin-left: auto; flex-shrink: 0; }
    </style>
</head>
<body class="xp-theme">

<div id="desktop">
    <div class="desktop-icons-container" id="iconsContainer"></div>
</div>

<div id="drive-window" class="window" style="width: 680px; height: 500px; left: 80px; top: 80px;">
    <div class="window-header"><span>🤖 Google Drive 雲端總管</span><div class="window-controls"><button class="min-btn" onclick="minimizeWindow('drive-window')">—</button><button class="max-btn" onclick="maximizeWindow('drive-window')">□</button><button class="close-btn" onclick="closeWindow('drive-window')">✖</button></div></div>
    <div class="window-body">
        <div style="margin-bottom:12px; display:flex; justify-content:space-between; align-items: center;">
            <button id="authBtn" onclick="handleAuthClick()" style="background:#4285F4; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">🔑 登入 Google 帳號</button>
            <span id="userDisplay" style="font-size:13px; color:#555;">未聯動硬碟</span>
            <button onclick="loadDriveFiles()" id="syncDriveBtn" disabled style="cursor:pointer;">🔄 重新整理</button>
        </div>
        <div style="font-size: 12px; color: #888; margin-bottom: 8px;" id="currentPath">目前路徑: 根目錄 (Root)</div>
        <div id="driveSearchBar">
            <input type="text" id="driveSearchInput" placeholder="🔍 搜尋 Drive 檔案..." onkeydown="if(event.key==='Enter')driveSearch()">
            <button id="driveSearchBtn" onclick="driveSearch()">搜尋</button>
            <button id="driveSearchClear" onclick="driveClearSearch()">✕ 清除</button>
        </div>
        <div id="driveSortBar">
            排序：<select id="driveSortSelect" onchange="loadDriveFiles()">
                <option value="name-asc">名稱 A→Z</option>
                <option value="name-desc">名稱 Z→A</option>
                <option value="type">類型</option>
                <option value="folder-first">資料夾優先</option>
            </select>
            <div style="flex:1"></div>
            <span id="driveFileCount" style="font-size:11px; color:#aaa;"></span>
        </div>
        <div class="drive-toolbar">
            <button id="viewGridBtn" class="active" onclick="setDriveView('grid')">⊞ 格狀</button>
            <button id="viewListBtn" onclick="setDriveView('list')">☰ 列表</button>
            <button id="newFolderBtn" onclick="createDriveFolder()" disabled style="font-size:12px;">📁➕ 新增資料夾</button>
            <div style="flex:1;"></div>
            <button id="uploadBtn" onclick="document.getElementById('uploadFileInput').click()" disabled style="background:#4285F4; color:white; border:none; border-radius:6px; padding:4px 12px; cursor:pointer; font-size:12px;">⬆️ 上傳</button>
            <input type="file" id="uploadFileInput" multiple style="display:none;" onchange="handleUploadFiles(event)">
        </div>
        <div id="uploadProgress" style="display:none; margin-bottom:6px; font-size:12px; color:#245edb; background:#eef5ff; border-radius:6px; padding:6px 10px;"></div>
        <div id="dropOverlay">⬆️ 拖曳放開即可上傳</div>
        <div class="drive-list view-grid" id="drive-list-content">請先點擊左上方登入並授權 Google Drive 權限。</div>
    </div>
</div>

<div id="settings-window" class="window" style="width: 650px; height: 620px; left: 180px; top: 60px;">
    <div class="window-header"><span>⚙️ 系統設定 & 捷徑管理</span><div class="window-controls"><button class="min-btn" onclick="minimizeWindow('settings-window')">—</button><button class="max-btn" onclick="maximizeWindow('settings-window')">□</button><button class="close-btn" onclick="closeWindow('settings-window')">✖</button></div></div>
    <div class="window-body">
        <div style="background:#f0f0f0; padding:12px; border-radius:12px;">
            <p><strong>🎨 佈景主題</strong></p>
            <button id="xpThemeBtn">🪟 Windows XP</button> <button id="macThemeBtn">🍎 macOS</button>
            <hr>
            <p><strong>🖼️ 桌布設定</strong></p>
            <div><input type="text" id="wallpaperUrl" placeholder="圖片網址" style="width: 60%;"><button id="applyWallpaperBtn">套用圖片</button></div>
            <div style="margin-top:6px;"><button id="resetWallpaperBtn">重置為預設桌布</button></div>
            <hr>
            <p><strong>☁️ 雲端設定狀態</strong></p>
            <div id="cloudSyncStatus" style="font-size:13px; color:#666;">尚未同步至雲端（使用本地暫存）</div>
            <button onclick="saveConfigToDrive()" id="forceUploadConfigBtn" disabled>📤 強制同步設定至 Google Drive</button>
            <hr>
            <p><strong>💾 設定備份 / 還原（JSON 檔）</strong></p>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <button onclick="exportConfigJson()" style="background:#388e3c; color:white; border:none; padding:7px 14px; border-radius:6px; cursor:pointer;">⬇️ 匯出設定 JSON</button>
                <button onclick="document.getElementById('importJsonInput').click()" style="background:#1565C0; color:white; border:none; padding:7px 14px; border-radius:6px; cursor:pointer;">⬆️ 匯入設定 JSON</button>
                <input type="file" id="importJsonInput" accept=".json,application/json" style="display:none;" onchange="importConfigJson(event)">
            </div>
            <div id="importExportStatus" style="font-size:12px; color:#888; margin-top:6px;"></div>
            <hr>
            <p><strong>📌 桌面捷徑管理</strong> <button id="newShortcutBtn">➕ 新增捷徑</button></p>
            <div class="shortcut-manager" id="shortcutListContainer"></div>
            <hr>
            <p><strong>📂 群組管理</strong> <button id="newGroupBtn">➕ 新增群組</button></p>
            <div class="shortcut-manager" id="groupListContainer"></div>
        </div>
    </div>
</div>

<div id="shortcutDialog" class="window" style="width: 440px; height: 450px; left: 250px; top: 120px;">
    <div class="window-header"><span id="dialogTitle">➕ 建立捷徑</span><div class="window-controls"><button class="close-btn" onclick="closeWindow('shortcutDialog')">✖</button></div></div>
    <div class="window-body">
        <div class="shortcut-form">
            <label>捷徑名稱:</label><input type="text" id="editShortcutName" placeholder="例如: Google首頁">
            <label>輸入圖示 (Emoji):</label><input type="text" id="customEmojiInput" placeholder="🌐" value="🌐" maxlength="2" style="width:60px; text-align:center;">
            <label>動作類型:</label>
            <select id="editShortcutActionType"><option value="url">開啟網址</option><option value="function">執行內建函數</option></select>
            <label>目標網址或函數呼叫:</label><input type="text" id="editShortcutTarget" placeholder="https://... 或 openWindow('drive-window')">
            <label><input type="checkbox" id="editShortcutPinTaskbar"> 顯示於工作列快捷區域</label>
            <button id="saveShortcutBtn" style="margin-top:12px; width:100%; padding:10px; background:#245edb; color:white; border:none; border-radius:6px; cursor:pointer;">💾 儲存捷徑</button>
        </div>
    </div>
</div>

<div id="groupDialog" class="window" style="width: 460px; height: 450px; left: 220px; top: 140px;">
    <div class="window-header"><span id="groupDialogTitle">📂 建立群組</span><div class="window-controls"><button class="close-btn" onclick="closeWindow('groupDialog')">✖</button></div></div>
    <div class="window-body">
        <div class="shortcut-form">
            <label>群組名稱:</label><input type="text" id="editGroupName" placeholder="例如：辦公工具">
            <label>群組圖示 (Emoji):</label><input type="text" id="editGroupEmoji" value="📂" maxlength="2" style="width:60px; text-align:center;">
            <label><strong>選取納入群組的捷徑:</strong></label>
            <div id="groupMemberCheckboxes" style="max-height:160px; overflow-y:auto; border:1px solid #ccc; border-radius:8px; padding:8px; margin:6px 0;"></div>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
    // ======================= Google API 設定資訊 =======================
    // 💡 提醒：請記得更換為您的 OAuth 2.0 用戶端 ID
    const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive';
    
    let gapiInited = false;
    let gisInited = false;
    let tokenClient;
    let configFileId = null;

    // ✨ 已將預設桌布全面內建為您指定的 Pexels 網址
    const DEFAULT_WALLPAPER = "https://images.pexels.com/photos/388415/pexels-photo-388415.jpeg";

    let systemConfig = {
        theme: "xp",
        wallpaperValue: DEFAULT_WALLPAPER,
        shortcuts: [
            {"id":1,"name":"雲端總管","icon":"📁","actionType":"function","actionValue":"openWindow('drive-window')","pinToTaskbar":true},
            {"id":2,"name":"系統設定","icon":"⚙️","actionType":"function","actionValue":"openWindow('settings-window')","pinToTaskbar":true},
            {"id":3,"name":"Google 搜尋","icon":"🌐","actionType":"url","actionValue":"https://www.google.com","pinToTaskbar":false}
        ],
        nextId: 4,
        groups: [],
        nextGroupId: 1
    };

    let driveFolderHistory = ['root'];

    function gapiLoaded() { gapi.load('client', initializeGapiClient); }
    async function initializeGapiClient() {
        await gapi.client.init({
            discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        });
        gapiInited = true;
        maybeEnableAuth();
    }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: '', 
        });
        gisInited = true;
        maybeEnableAuth();
    }
    function maybeEnableAuth() {
        if (gapiInited && gisInited) {
            document.getElementById('authBtn').style.display = 'inline-block';
            loadLocalFallback();
        }
    }

    function handleAuthClick() {
        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) { throw (resp); }
            document.getElementById('authBtn').innerText = "✅ 已連結 Google";
            document.getElementById('syncDriveBtn').disabled = false;
            document.getElementById('forceUploadConfigBtn').disabled = false;
            document.getElementById('uploadBtn').disabled = false;
            document.getElementById('newFolderBtn').disabled = false;
            document.getElementById('userDisplay').innerText = "雲端硬碟已就緒";
            
            await syncConfigFromDrive();
            loadDriveFiles();
        };

        if (gapi.client.getToken() === null) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            tokenClient.requestAccessToken({prompt: ''});
        }
    }

    // ======================= 雲端總管讀取（含排序/搜尋/右鍵） =======================
    let _driveAllFiles = [];
    let _driveSearchMode = false;
    let _ctxTarget = null;

    function getFileInfo(file) {
        const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
        let icon = '📄', typeBadge = '檔案', isImage = false;
        if (isFolder)                                             { icon = '📁'; typeBadge = '資料夾'; }
        else if (file.mimeType.includes('image'))                { icon = '🖼️'; typeBadge = '圖片'; isImage = true; }
        else if (file.mimeType.includes('pdf'))                  { icon = '📕'; typeBadge = 'PDF'; }
        else if (file.mimeType.includes('sheet') || file.mimeType.includes('csv')) { icon = '📊'; typeBadge = '試算表'; }
        else if (file.mimeType.includes('document'))             { icon = '📝'; typeBadge = '文件'; }
        else if (file.mimeType.includes('presentation'))         { icon = '📑'; typeBadge = '簡報'; }
        else if (file.mimeType.includes('video'))                { icon = '🎬'; typeBadge = '影片'; }
        else if (file.mimeType.includes('audio'))                { icon = '🎵'; typeBadge = '音樂'; }
        else if (file.mimeType.includes('zip') || file.mimeType.includes('compressed')) { icon = '🗜️'; typeBadge = '壓縮檔'; }
        return { icon, typeBadge, isImage, isFolder };
    }

    function sortFiles(files) {
        const s = document.getElementById('driveSortSelect');
        const mode = s ? s.value : 'folder-first';
        return [...files].sort((a, b) => {
            const aF = a.mimeType === 'application/vnd.google-apps.folder';
            const bF = b.mimeType === 'application/vnd.google-apps.folder';
            if (mode === 'folder-first') {
                if (aF !== bF) return aF ? -1 : 1;
                return a.name.localeCompare(b.name, 'zh-TW');
            }
            if (mode === 'name-asc')  return a.name.localeCompare(b.name, 'zh-TW');
            if (mode === 'name-desc') return b.name.localeCompare(a.name, 'zh-TW');
            if (mode === 'type')      return a.mimeType.localeCompare(b.mimeType);
            return 0;
        });
    }

    function renderDriveFiles(files, showBack) {
        const listContent = document.getElementById('drive-list-content');
        const sorted = sortFiles(files);
        listContent.innerHTML = '';
        const currentView = window._driveView || 'grid';
        listContent.className = 'drive-list view-' + currentView;

        if (showBack) {
            const back = document.createElement('div');
            back.className = 'drive-item';
            back.innerHTML = '<span class="file-icon">⬆️</span><span class="file-name">.. 返回上一層</span>';
            back.onclick = popFolder;
            listContent.appendChild(back);
        }

        sorted.forEach(file => {
            const { icon, typeBadge, isImage, isFolder } = getFileInfo(file);
            const item = document.createElement('div');
            item.className = 'drive-item';
            item.dataset.fileId = file.id;
            item.dataset.fileName = file.name;
            item.dataset.fileMime = file.mimeType;

            item.innerHTML = '<span class="file-icon">' + icon + '</span><span class="file-name" title="' + escapeHtml(file.name) + '">' + escapeHtml(file.name) + '</span><span class="file-type-badge">' + typeBadge + '</span>' +
                (!isFolder ? '<button class="dl-btn" title="下載">⬇️</button>' : '');

            item.addEventListener('click', () => {
                if (isFolder) pushFolder(file.id, file.name);
                else if (isImage) previewImage(file.id, file.name);
                else window.open(file.webViewLink, '_blank');
            });

            const dlBtn = item.querySelector('.dl-btn');
            if (dlBtn) dlBtn.addEventListener('click', e => { e.stopPropagation(); downloadDriveFile(file.id, file.name, file.mimeType); });

            item.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, file); });
            listContent.appendChild(item);
        });

        const countEl = document.getElementById('driveFileCount');
        if (countEl) countEl.innerText = sorted.length + ' 個項目';
    }

    async function loadDriveFiles() {
        const listContent = document.getElementById('drive-list-content');
        const currentFolderId = driveFolderHistory[driveFolderHistory.length - 1];
        listContent.innerHTML = '<div style="color:#aaa; padding:20px; text-align:center;">⏳ 讀取中...</div>';
        _driveSearchMode = false;
        const clearBtn = document.getElementById('driveSearchClear');
        if (clearBtn) clearBtn.style.display = 'none';
        try {
            const response = await gapi.client.drive.files.list({
                pageSize: 100,
                fields: 'files(id, name, mimeType, webViewLink)',
                q: "'" + currentFolderId + "' in parents and trashed = false"
            });
            _driveAllFiles = response.result.files || [];
            if (_driveAllFiles.length === 0) {
                listContent.innerHTML = '<div style="color:#aaa; padding:20px; text-align:center;">此資料夾空空如也 🫙</div>';
                return;
            }
            renderDriveFiles(_driveAllFiles, driveFolderHistory.length > 1);
        } catch (err) {
            console.error(err);
            listContent.innerHTML = '❌ 讀取失敗，請確認 API 授權與設定。';
        }
    }

    async function driveSearch() {
        const q = document.getElementById('driveSearchInput').value.trim();
        if (!q) return;
        const listContent = document.getElementById('drive-list-content');
        listContent.innerHTML = '<div style="color:#aaa; padding:20px; text-align:center;">🔍 搜尋中...</div>';
        _driveSearchMode = true;
        const clearBtn = document.getElementById('driveSearchClear');
        if (clearBtn) clearBtn.style.display = 'inline-block';
        try {
            const token = gapi.client.getToken();
            const safeQ = q.replace(/'/g, "\\'");
            const res = await fetch(
                "https://www.googleapis.com/drive/v3/files?q=" + encodeURIComponent("name contains '" + safeQ + "' and trashed=false") + "&fields=files(id,name,mimeType,webViewLink)&pageSize=50",
                { headers: { 'Authorization': 'Bearer ' + token.access_token } }
            );
            const data = await res.json();
            const files = data.files || [];
            if (files.length === 0) { listContent.innerHTML = '<div style="padding:20px;color:#aaa">找不到符合的檔案</div>'; return; }
            renderDriveFiles(files, false);
        } catch(e) { listContent.innerHTML = '❌ 搜尋失敗'; }
    }

    function driveClearSearch() {
        document.getElementById('driveSearchInput').value = '';
        const clearBtn = document.getElementById('driveSearchClear');
        if (clearBtn) clearBtn.style.display = 'none';
        loadDriveFiles();
    }

    function pushFolder(id, name) {
        driveFolderHistory.push(id);
        const pathEl = document.getElementById('currentPath');
        if (pathEl) {
            const cur = pathEl.innerText.replace('目前路徑: ', '');
            pathEl.innerText = '目前路徑: ' + cur + ' > ' + (name || id);
        }
        loadDriveFiles();
    }

    function popFolder() {
        if (driveFolderHistory.length <= 1) return;
        driveFolderHistory.pop();
        const pathEl = document.getElementById('currentPath');
        if (pathEl) {
            const parts = pathEl.innerText.replace('目前路徑: ', '').split(' > ');
            parts.pop();
            pathEl.innerText = '目前路徑: ' + parts.join(' > ');
        }
        loadDriveFiles();
    }

    function showCtxMenu(e, file) {
        _ctxTarget = file;
        const menu = document.getElementById('ctxMenu');
        menu.style.display = 'block';
        const { isFolder } = getFileInfo(file);
        document.getElementById('ctxOpen').style.display = isFolder ? 'none' : 'flex';
        document.getElementById('ctxDownload').style.display = isFolder ? 'none' : 'flex';
        let x = e.clientX, y = e.clientY;
        if (x + 180 > window.innerWidth) x = window.innerWidth - 185;
        if (y + 200 > window.innerHeight) y = window.innerHeight - 210;
        menu.style.left = x + 'px'; menu.style.top = y + 'px';
    }

    function hideCtxMenu() { document.getElementById('ctxMenu').style.display = 'none'; }
    document.addEventListener('click', hideCtxMenu);

    document.getElementById('ctxOpen').onclick = () => { if (_ctxTarget) window.open(_ctxTarget.webViewLink, '_blank'); hideCtxMenu(); };
    document.getElementById('ctxDownload').onclick = () => { if (_ctxTarget) downloadDriveFile(_ctxTarget.id, _ctxTarget.name, _ctxTarget.mimeType); hideCtxMenu(); };
    document.getElementById('ctxRename').onclick = async () => {
        if (!_ctxTarget) return;
        const newName = prompt('新名稱：', _ctxTarget.name);
        if (!newName || newName === _ctxTarget.name) { hideCtxMenu(); return; }
        const token = gapi.client.getToken();
        await fetch('https://www.googleapis.com/drive/v3/files/' + _ctxTarget.id, {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + token.access_token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
        });
        hideCtxMenu(); loadDriveFiles();
    };
    document.getElementById('ctxShare').onclick = async () => {
        if (!_ctxTarget) return;
        const token = gapi.client.getToken();
        try {
            await fetch('https://www.googleapis.com/drive/v3/files/' + _ctxTarget.id + '/permissions', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token.access_token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'reader', type: 'anyone' })
            });
            const link = 'https://drive.google.com/file/d/' + _ctxTarget.id + '/view?usp=sharing';
            await navigator.clipboard.writeText(link);
            alert('✅ 分享連結已複製到剪貼板！');
        } catch(err) { alert('❌ 複製失敗：' + err.message); }
        hideCtxMenu();
    };
    document.getElementById('ctxDelete').onclick = async () => {
        if (!_ctxTarget) return;
        if (!confirm('確定要將「' + _ctxTarget.name + '」移至垃圾桶？')) { hideCtxMenu(); return; }
        const token = gapi.client.getToken();
        await fetch('https://www.googleapis.com/drive/v3/files/' + _ctxTarget.id + '/trash', {
            method: 'POST', headers: { 'Authorization': 'Bearer ' + token.access_token }
        });
        hideCtxMenu(); loadDriveFiles();
    };

    // ======================= 雲端設定同步（自雲端載入） =======================
    async function syncConfigFromDrive() {
        const token = gapi.client.getToken();
        if (!token) return;
        try {
            // 搜尋設定檔
            const listRes = await gapi.client.drive.files.list({
                q: "name = 'mydesktop_config.json' and trashed = false",
                fields: 'files(id, name)'
            });
            const files = listRes.result.files;
            if (files && files.length > 0) {
                configFileId = files[0].id;
                // 用原生 fetch 讀取檔案內容（gapi.client.drive.files.get alt=media 常有解析問題）
                const fileRes = await fetch(
                    `https://www.googleapis.com/drive/v3/files/${configFileId}?alt=media`,
                    { headers: { 'Authorization': `Bearer ${token.access_token}` } }
                );
                if (!fileRes.ok) throw new Error(`讀取設定失敗 HTTP ${fileRes.status}`);
                const loaded = await fileRes.json();
                if (loaded && loaded.shortcuts) {
                    systemConfig = loaded;
                    document.getElementById('cloudSyncStatus').innerText = "✅ 成功自 Google Drive 載入雲端設定";
                    applySystemSettings();
                }
            } else {
                document.getElementById('cloudSyncStatus').innerText = "ℹ️ 雲端無設定，將同步目前的預設配置";
                await saveConfigToDrive();
            }
        } catch (e) {
            console.warn("同步設定發生問題，切換至本地快取模式", e);
            document.getElementById('cloudSyncStatus').innerText = "⚠️ 雲端同步失敗，使用本地設定：" + e.message;
        }
    }

    // 🔥【根本修復】gapi.client.request 無法正確傳送 Blob，改用原生 fetch API
    // 直接以 Authorization Bearer token 呼叫 Drive REST API，100% 相容 multipart 上傳
    async function saveConfigToDrive() {
        const token = gapi.client.getToken();
        if (!token) return;

        const boundary = 'MyDesktopConfigBoundary314159';
        const metadata = { name: 'mydesktop_config.json', mimeType: 'application/json' };
        const configJson = JSON.stringify(systemConfig, null, 2);

        const body = [
            `--${boundary}\r\n`,
            `Content-Type: application/json; charset=UTF-8\r\n\r\n`,
            `${JSON.stringify(metadata)}\r\n`,
            `--${boundary}\r\n`,
            `Content-Type: application/json; charset=UTF-8\r\n\r\n`,
            `${configJson}\r\n`,
            `--${boundary}--`
        ].join('');

        const url = configFileId
            ? `https://www.googleapis.com/upload/drive/v3/files/${configFileId}?uploadType=multipart`
            : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
        const method = configFileId ? 'PATCH' : 'POST';

        try {
            const res = await fetch(url, {
                method,
                headers: {
                    'Authorization': `Bearer ${token.access_token}`,
                    'Content-Type': `multipart/related; boundary=${boundary}`
                },
                body
            });
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            const result = await res.json();
            if (!configFileId) configFileId = result.id;
            document.getElementById('cloudSyncStatus').innerText = `✅ 設定已成功同步至 Google Drive (${new Date().toLocaleTimeString()})`;
        } catch(err) {
            console.error("上傳失敗細節:", err);
            document.getElementById('cloudSyncStatus').innerText = "❌ 雲端上傳錯誤：" + err.message;
        }
    }

    // ======================= UI 渲染邏輯群 =======================
    function loadLocalFallback() {
        const local = localStorage.getItem('mydesktop_gdrive_local');
        if (local) { try { systemConfig = JSON.parse(local); } catch(e){} }
        applySystemSettings();
    }

    function saveSettingsLocally() {
        localStorage.setItem('mydesktop_gdrive_local', JSON.stringify(systemConfig));
        renderAllUI();
        saveConfigToDrive();
    }

    function applySystemSettings() {
        document.body.style.backgroundImage = `url('${systemConfig.wallpaperValue}')`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.getElementById('wallpaperUrl').value = systemConfig.wallpaperValue;
        
        document.body.classList.remove("xp-theme", "mac-theme");
        document.body.classList.add(systemConfig.theme === "xp" ? "xp-theme" : "mac-theme");
        renderAllUI();
    }

    function renderAllUI() {
        renderDesktopIcons();
        renderShortcutManager();
        renderQuickLaunch();
        renderGroupManager();
    }

    function getGroupedShortcutIds() {
        const ids = new Set();
        systemConfig.groups.forEach(g => g.memberIds.forEach(id => ids.add(id)));
        return ids;
    }

    function renderDesktopIcons() {
        const container = document.getElementById('iconsContainer');
        if (!container) return; container.innerHTML = '';
        const groupedIds = getGroupedShortcutIds();

        systemConfig.groups.forEach(group => {
            const members = group.memberIds.map(id => systemConfig.shortcuts.find(s => s.id === id)).filter(Boolean);
            const groupDiv = document.createElement('div');
            groupDiv.className = 'icon-group';
            const previews = members.slice(0, 4).map(s => `<div class="group-preview-icon">${s.icon || '📄'}</div>`).join('');
            let extra = ''; for (let i = members.length; i < 4; i++) extra += `<div class="group-preview-icon"></div>`;
            
            groupDiv.innerHTML = `<div class="group-folder">${previews}${extra}</div><span>${escapeHtml(group.name)}</span>`;
            groupDiv.addEventListener('click', (e) => { e.stopPropagation(); openGroupPopup(group, groupDiv); });
            container.appendChild(groupDiv);
        });

        systemConfig.shortcuts.forEach((shortcut) => {
            if (groupedIds.has(shortcut.id)) return;
            const iconDiv = document.createElement('div');
            iconDiv.className = 'icon';
            iconDiv.innerHTML = `<div class="icon-img" style="font-size:36px;">${shortcut.icon || '📄'}</div><span>${escapeHtml(shortcut.name)}</span>`;
            iconDiv.addEventListener('click', (e) => { e.stopPropagation(); executeAction(shortcut); });
            container.appendChild(iconDiv);
        });
    }

    function executeAction(shortcut) {
        if (shortcut.actionType === "url") window.open(shortcut.actionValue, '_blank');
        else if (shortcut.actionType === "function") { try { eval(shortcut.actionValue); } catch(e) { alert("組件呼叫失敗"); } }
    }

    function openGroupPopup(group, anchorEl) {
        const popup = document.getElementById('groupPopup');
        const overlay = document.getElementById('groupPopupOverlay');
        const grid = document.getElementById('groupPopupGrid'); grid.innerHTML = '';
        
        group.memberIds.map(id => systemConfig.shortcuts.find(s => s.id === id)).filter(Boolean).forEach(s => {
            const item = document.createElement('div');
            item.className = 'popup-item';
            item.innerHTML = `<div style="font-size:32px;">${s.icon}</div><span>${escapeHtml(s.name)}</span>`;
            item.addEventListener('click', () => { executeAction(s); closeGroupPopup(); });
            grid.appendChild(item);
        });
        overlay.style.display = 'block'; popup.style.display = 'block';
        const rect = anchorEl.getBoundingClientRect();
        popup.style.left = `${rect.left}px`; popup.style.top = `${rect.top + 70}px`;
    }
    function closeGroupPopup() {
        document.getElementById('groupPopup').style.display = 'none';
        document.getElementById('groupPopupOverlay').style.display = 'none';
    }

    function buildStartMenu() {
        const menu = document.getElementById('startMenu');
        menu.innerHTML = `
            <div class="start-menu-item" onclick="openWindow('drive-window'); closeStartMenu();"><span>📁</span> Google 雲端總管</div>
            <div class="start-menu-item" onclick="openWindow('settings-window'); closeStartMenu();"><span>⚙️</span> 系統控制設定</div>
            <div class="start-menu-item" onclick="openWindow('calc-window'); closeStartMenu();"><span>🧮</span> 計算機</div>
            <div class="start-menu-item" onclick="addStickyNote(); closeStartMenu();"><span>📝</span> 新增便利貼</div>
            <hr>
        `;
        systemConfig.shortcuts.forEach(short => {
            const div = document.createElement('div'); div.className = 'start-menu-item';
            div.innerHTML = `<span>${short.icon}</span> ${escapeHtml(short.name)}`;
            div.onclick = () => { executeAction(short); closeStartMenu(); };
            menu.appendChild(div);
        });
    }
    function toggleStartMenu() {
        const m = document.getElementById('startMenu');
        if (m.style.display === 'block') m.style.display = 'none';
        else { buildStartMenu(); m.style.display = 'block'; }
    }
    function closeStartMenu() { document.getElementById('startMenu').style.display = 'none'; }
    
    function renderQuickLaunch() {
        const area = document.getElementById('quickLaunchArea'); if (!area) return; area.innerHTML = '';
        systemConfig.shortcuts.filter(s => s.pinToTaskbar).forEach(short => {
            const div = document.createElement('div'); div.className = 'quick-launch-item';
            div.title = short.name; div.innerHTML = `<span class="emoji-icon">${short.icon}</span>`;
            div.addEventListener('click', () => executeAction(short));
            area.appendChild(div);
        });
    }

    function renderShortcutManager() {
        const container = document.getElementById('shortcutListContainer'); if (!container) return;
        container.innerHTML = systemConfig.shortcuts.map(short => `
            <div class="shortcut-row">
                <span>${short.icon} ${escapeHtml(short.name)}</span>
                <div>
                    <label style="font-size:11px;"><input type="checkbox" class="pin-cb" data-id="${short.id}" ${short.pinToTaskbar ? 'checked' : ''}> Pin</label>
                    <button onclick="deleteShortcut(${short.id})">🗑️</button>
                </div>
            </div>
        `).join('');
        container.querySelectorAll('.pin-cb').forEach(cb => cb.addEventListener('change', (e) => {
            const id = parseInt(cb.getAttribute('data-id'));
            const s = systemConfig.shortcuts.find(shortcut => shortcut.id === id);
            if (s) { s.pinToTaskbar = cb.checked; saveSettingsLocally(); }
        }));
    }

    document.getElementById('saveShortcutBtn').onclick = () => {
        const name = document.getElementById('editShortcutName').value.trim();
        const icon = document.getElementById('customEmojiInput').value.trim() || '🌐';
        const actionType = document.getElementById('editShortcutActionType').value;
        const target = document.getElementById('editShortcutTarget').value.trim();
        const pin = document.getElementById('editShortcutPinTaskbar').checked;

        if(!name || !target) { alert('欄位不完整'); return; }
        systemConfig.shortcuts.push({ id: systemConfig.nextId++, name, icon, actionType, actionValue: target, pinToTaskbar: pin });
        closeWindow('shortcutDialog'); saveSettingsLocally();
    };

    function deleteShortcut(id) {
        systemConfig.shortcuts = systemConfig.shortcuts.filter(s => s.id !== id);
        systemConfig.groups.forEach(g => g.memberIds = g.memberIds.filter(mid => mid !== id));
        saveSettingsLocally();
    }

    function renderGroupManager() {
        const container = document.getElementById('groupListContainer'); if (!container) return;
        container.innerHTML = systemConfig.groups.map(g => `
            <div class="group-row"><span>${g.emoji} ${escapeHtml(g.name)} (${g.memberIds.length}項)</span><button onclick="deleteGroup(${g.id})">🗑️</button></div>
        `).join('');
    }

    function openGroupDialog() {
        const box = document.getElementById('groupMemberCheckboxes');
        box.innerHTML = systemConfig.shortcuts.map(s => `
            <label style="display:block; margin:3px 0;"><input type="checkbox" class="g-member-cb" value="${s.id}"> ${s.icon} ${escapeHtml(s.name)}</label>
        `).join('');
        openWindow('groupDialog');
    }

    document.getElementById('saveGroupBtn').onclick = () => {
        const name = document.getElementById('editGroupName').value.trim();
        const emoji = document.getElementById('editGroupEmoji').value.trim() || '📂';
        const memberIds = [...document.querySelectorAll('.g-member-cb:checked')].map(cb => parseInt(cb.value));
        if(!name || memberIds.length === 0) { alert('請填寫完整資訊'); return; }
        systemConfig.groups.push({ id: systemConfig.nextGroupId++, name, emoji, memberIds });
        closeWindow('groupDialog'); saveSettingsLocally();
    };

    function deleteGroup(id) { systemConfig.groups = systemConfig.groups.filter(g => g.id !== id); saveSettingsLocally(); }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    
    function initDragWindows() {
        document.querySelectorAll('.window-header').forEach(h => {
            const w = h.parentElement; let drag = false, ox, oy;
            h.addEventListener('mousedown', e => {
                if (e.target.closest('.window-controls')) return;
                drag = true; const r = w.getBoundingClientRect();
                ox = e.clientX - r.left; oy = e.clientY - r.top;
                document.querySelectorAll('.window').forEach(win => win.style.zIndex = 100);
                w.style.zIndex = 1000; e.preventDefault();
            });
            window.addEventListener('mousemove', e => { if (drag) { w.style.left = (e.clientX - ox) + 'px'; w.style.top = (e.clientY - oy) + 'px'; } });
            window.addEventListener('mouseup', () => drag = false);
        });
    }

    function bindSystemEvents() {
        document.getElementById('xpThemeBtn').onclick = () => { systemConfig.theme = "xp"; saveSettingsLocally(); applySystemSettings(); };
        document.getElementById('macThemeBtn').onclick = () => { systemConfig.theme = "mac"; saveSettingsLocally(); applySystemSettings(); };
        document.getElementById('applyWallpaperBtn').onclick = () => {
            const url = document.getElementById('wallpaperUrl').value.trim();
            if(url) { systemConfig.wallpaperValue = url; saveSettingsLocally(); applySystemSettings(); }
        };
        document.getElementById('resetWallpaperBtn').onclick = () => {
            systemConfig.wallpaperValue = DEFAULT_WALLPAPER;
            saveSettingsLocally(); applySystemSettings();
        };
        document.getElementById('newShortcutBtn').onclick = () => openWindow('shortcutDialog');
        document.getElementById('newGroupBtn').onclick = () => openGroupDialog();
        document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); toggleStartMenu(); };
        document.addEventListener('click', () => closeStartMenu());
    }

    // ======================= JSON 匯出 / 匯入 =======================
    function exportConfigJson() {
        const exportData = JSON.parse(JSON.stringify(systemConfig));
        exportData._exportedAt = new Date().toISOString();
        exportData._version = "1.0";

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = `mydesktop_config_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        document.getElementById('importExportStatus').innerText = `✅ 已匯出設定檔：mydesktop_config_${dateStr}.json`;
    }

    function importConfigJson(event) {
        const file = event.target.files[0];
        if (!file) return;
        const statusEl = document.getElementById('importExportStatus');
        statusEl.innerText = '⏳ 讀取中...';

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                // 基本欄位驗證
                if (!imported.shortcuts || !Array.isArray(imported.shortcuts)) {
                    throw new Error('JSON 格式不正確，缺少 shortcuts 陣列');
                }
                // 保留匯入的設定，清除匯出時附加的後設資料
                delete imported._exportedAt;
                delete imported._version;

                // 確保必要欄位存在
                if (typeof imported.nextId !== 'number') imported.nextId = Math.max(0, ...imported.shortcuts.map(s => s.id || 0)) + 1;
                if (!Array.isArray(imported.groups)) imported.groups = [];
                if (typeof imported.nextGroupId !== 'number') imported.nextGroupId = Math.max(0, ...imported.groups.map(g => g.id || 0)) + 1;
                if (!imported.theme) imported.theme = 'xp';
                if (!imported.wallpaperValue) imported.wallpaperValue = DEFAULT_WALLPAPER;

                if (confirm(`即將匯入設定，將覆蓋目前所有捷徑（${imported.shortcuts.length} 個）與群組（${imported.groups.length} 個）。確定繼續？`)) {
                    systemConfig = imported;
                    saveSettingsLocally();
                    applySystemSettings();
                    statusEl.innerText = `✅ 匯入成功！共載入 ${systemConfig.shortcuts.length} 個捷徑、${systemConfig.groups.length} 個群組`;
                } else {
                    statusEl.innerText = '↩️ 已取消匯入';
                }
            } catch (err) {
                statusEl.innerText = '❌ 匯入失敗：' + err.message;
                console.error('JSON 匯入錯誤', err);
            }
            // 重設 input 以允許重複選同一檔
            event.target.value = '';
        };
        reader.readAsText(file, 'UTF-8');
    }

    // ======================= 上傳 / 下載 =======================
    async function handleUploadFiles(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;
        const token = gapi.client.getToken();
        if (!token) { alert('請先登入 Google 帳號'); return; }

        const progressEl = document.getElementById('uploadProgress');
        const currentFolderId = driveFolderHistory[driveFolderHistory.length - 1];
        progressEl.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            progressEl.innerText = `⬆️ 上傳中 (${i+1}/${files.length})：${file.name}`;
            try {
                const metadata = { name: file.name, parents: [currentFolderId] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token.access_token}` },
                    body: form
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
            } catch(err) {
                progressEl.innerText = `❌ 上傳失敗：${file.name} — ${err.message}`;
                event.target.value = '';
                return;
            }
        }
        progressEl.innerText = `✅ 已成功上傳 ${files.length} 個檔案`;
        setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
        event.target.value = '';
        loadDriveFiles();
    }

    async function downloadDriveFile(fileId, fileName, mimeType) {
        const token = gapi.client.getToken();
        if (!token) { alert('請先登入 Google 帳號'); return; }

        // Google Docs 格式需要用 export 轉換
        const exportMap = {
            'application/vnd.google-apps.document': { mime: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', ext: '.docx' },
            'application/vnd.google-apps.spreadsheet': { mime: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', ext: '.xlsx' },
            'application/vnd.google-apps.presentation': { mime: 'application/vnd.openxmlformats-officedocument.presentationml.presentation', ext: '.pptx' },
        };

        let url, dlName = fileName;
        if (exportMap[mimeType]) {
            const exp = exportMap[mimeType];
            url = `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=${encodeURIComponent(exp.mime)}`;
            if (!dlName.endsWith(exp.ext)) dlName += exp.ext;
        } else {
            url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
        }

        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token.access_token}` } });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = dlName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        } catch(err) {
            alert(`❌ 下載失敗：${err.message}`);
        }
    }

    // ===== 圖片預覽 =====
    async function previewImage(fileId, fileName) {
        const token = gapi.client.getToken();
        if (!token) return;
        try {
            const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { 'Authorization': `Bearer ${token.access_token}` } });
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            document.getElementById('imgLightboxImg').src = url;
            document.getElementById('imgLightboxName').innerText = fileName;
            document.getElementById('imgLightbox').classList.add('open');
        } catch(e) { alert('圖片載入失敗'); }
    }
    document.getElementById('imgLightbox').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });

    // ===== 新增資料夾 =====
    async function createDriveFolder() {
        const name = prompt('新資料夾名稱：');
        if (!name) return;
        const token = gapi.client.getToken();
        const currentFolderId = driveFolderHistory[driveFolderHistory.length - 1];
        try {
            const res = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token.access_token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [currentFolderId] })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            loadDriveFiles();
        } catch(e) { alert('建立失敗：' + e.message); }
    }

    // ===== 拖曳上傳 =====
    (function() {
        const winBody = document.querySelector('#drive-window .window-body');
        if (!winBody) return;
        const overlay = document.getElementById('dropOverlay');
        winBody.addEventListener('dragover', e => { e.preventDefault(); overlay.classList.add('active'); });
        winBody.addEventListener('dragleave', e => { if (!winBody.contains(e.relatedTarget)) overlay.classList.remove('active'); });
        winBody.addEventListener('drop', async e => {
            e.preventDefault(); overlay.classList.remove('active');
            const token = gapi.client.getToken();
            if (!token) { alert('請先登入'); return; }
            const files = Array.from(e.dataTransfer.files);
            if (!files.length) return;
            const progressEl = document.getElementById('uploadProgress');
            const currentFolderId = driveFolderHistory[driveFolderHistory.length - 1];
            progressEl.style.display = 'block';
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                progressEl.innerText = `⬆️ 拖曳上傳 (${i+1}/${files.length})：${file.name}`;
                const metadata = { name: file.name, parents: [currentFolderId] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { 'Authorization': `Bearer ${token.access_token}` }, body: form });
            }
            progressEl.innerText = `✅ 已上傳 ${files.length} 個檔案`;
            setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
            loadDriveFiles();
        });
    })();

    // ===== 視窗最小化 / 最大化 =====
    const _winStates = {};
    function minimizeWindow(id) {
        const w = document.getElementById(id);
        if (!w) return;
        _winStates[id] = _winStates[id] || {};
        if (w.dataset.minimized === '1') {
            w.style.height = _winStates[id].h || '';
            w.querySelector('.window-body').style.display = '';
            w.dataset.minimized = '0';
        } else {
            _winStates[id].h = w.style.height;
            w.querySelector('.window-body').style.display = 'none';
            w.style.height = '32px';
            w.dataset.minimized = '1';
        }
        updateTaskbarWins();
    }
    function maximizeWindow(id) {
        const w = document.getElementById(id);
        if (!w) return;
        _winStates[id] = _winStates[id] || {};
        if (w.dataset.maximized === '1') {
            w.style.left = _winStates[id].left || '80px';
            w.style.top  = _winStates[id].top  || '80px';
            w.style.width  = _winStates[id].width  || '';
            w.style.height = _winStates[id].height || '';
            w.dataset.maximized = '0';
        } else {
            _winStates[id].left   = w.style.left;
            _winStates[id].top    = w.style.top;
            _winStates[id].width  = w.style.width;
            _winStates[id].height = w.style.height;
            w.style.left = '0'; w.style.top = '0';
            w.style.width  = '100vw'; w.style.height = 'calc(100vh - 50px)';
            w.dataset.maximized = '1';
        }
    }

    // 工作列視窗按鈕
    const _openWindows = {};
    function openWindow(id) {
        const w = document.getElementById(id);
        if (!w) return;
        w.style.display = 'flex'; w.style.zIndex = 105;
        _openWindows[id] = true;
        updateTaskbarWins();
    }
    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
        delete _openWindows[id];
        updateTaskbarWins();
    }
    function updateTaskbarWins() {
        const area = document.getElementById('taskbarWinArea');
        if (!area) return;
        area.innerHTML = '';
        Object.keys(_openWindows).forEach(id => {
            const w = document.getElementById(id);
            if (!w) return;
            const title = w.querySelector('.window-header span')?.innerText || id;
            const btn = document.createElement('button');
            btn.className = 'taskbar-win-btn';
            btn.innerText = title;
            btn.title = title;
            btn.onclick = () => {
                if (w.dataset.minimized === '1') minimizeWindow(id);
                w.style.zIndex = 1000;
                document.querySelectorAll('.window').forEach(x => { if (x !== w) x.style.zIndex = 100; });
            };
            area.appendChild(btn);
        });
    }

    // ===== 便利貼 =====
    const stickyColors = [
        {bg:'#fff9c4', hdr:'#f9a825'},
        {bg:'#c8e6c9', hdr:'#388e3c'},
        {bg:'#bbdefb', hdr:'#1565c0'},
        {bg:'#f8bbd0', hdr:'#c2185b'},
        {bg:'#ffe0b2', hdr:'#e65100'}
    ];
    let _stickyCount = 0;
    function addStickyNote() {
        const c = stickyColors[_stickyCount % stickyColors.length];
        _stickyCount++;
        const note = document.createElement('div');
        note.className = 'sticky-note';
        note.style.cssText = `left:${80 + _stickyCount*20}px; top:${100 + _stickyCount*20}px; background:${c.bg}`;
        note.innerHTML = `<div class="sticky-header" style="background:${c.hdr}; color:white;">📝 便利貼 <button class="sticky-close" onclick="this.closest('.sticky-note').remove()">✕</button></div><textarea class="sticky-body" placeholder="在此輸入文字..."></textarea>`;
        document.getElementById('stickyContainer').appendChild(note);
        // 拖曳
        const hdr = note.querySelector('.sticky-header');
        let drag = false, ox, oy;
        hdr.addEventListener('mousedown', e => { if(e.target.tagName==='BUTTON') return; drag=true; ox=e.clientX-note.offsetLeft; oy=e.clientY-note.offsetTop; e.preventDefault(); });
        window.addEventListener('mousemove', e => { if(drag) { note.style.left=(e.clientX-ox)+'px'; note.style.top=(e.clientY-oy)+'px'; } });
        window.addEventListener('mouseup', () => drag=false);
    }

    // ===== 計算機 =====
    let _calcExpr = ''; let _calcNewNum = true;
    function calcInput(v) {
        const disp = document.getElementById('calcDisplay');
        if (v === 'C') { _calcExpr = ''; _calcNewNum = true; disp.innerText = '0'; return; }
        if (v === '=') {
            try {
                const result = Function('"use strict"; return (' + _calcExpr + ')')();
                _calcExpr = String(parseFloat(result.toFixed(10)));
                disp.innerText = _calcExpr; _calcNewNum = true;
            } catch(e) { disp.innerText = '錯誤'; _calcExpr = ''; _calcNewNum = true; }
            return;
        }
        if (v === '±') { if (_calcExpr) { _calcExpr = _calcExpr.startsWith('-') ? _calcExpr.slice(1) : '-'+_calcExpr; disp.innerText = _calcExpr; } return; }
        if (v === '%') { try { _calcExpr = String(parseFloat(Function('"use strict"; return ('+_calcExpr+')')() / 100)); disp.innerText = _calcExpr; } catch(e){} return; }
        if (_calcNewNum && '+-*/'.includes(v)) { _calcNewNum = false; }
        else if (_calcNewNum) { _calcExpr = ''; _calcNewNum = false; }
        _calcExpr += v; disp.innerText = _calcExpr;
    }

    window._driveView = 'grid';
    function setDriveView(mode) {
        window._driveView = mode;
        const list = document.getElementById('drive-list-content');
        if (list) { list.className = `drive-list view-${mode}`; }
        document.getElementById('viewGridBtn').classList.toggle('active', mode === 'grid');
        document.getElementById('viewListBtn').classList.toggle('active', mode === 'list');
    }

    function init() { bindSystemEvents(); initDragWindows(); updateClock(); setInterval(updateClock, 1000); loadLocalFallback(); }
    init();
</script>
